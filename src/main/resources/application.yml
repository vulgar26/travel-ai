server:
  port: 8081

spring:
  application:
    name: travel-ai-planner
  # 本机存在 application-local.yml 时自动合并（.gitignore；无文件则跳过，不影响 CI）
  config:
    import: optional:classpath:application-local.yml

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/ragent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    # 已有库 public 里已有表/扩展，但从未跑过 Flyway（无 flyway_schema_history）时，需先 baseline 再迁移
    baseline-on-migrate: true
    # 设为 0：基线后仍会执行 V1（V1 内为 IF NOT EXISTS，可安全重跑）；默认 1 会导致 V1 被当作已处于基线而跳过
    baseline-version: 0

  # Redis配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  # Spring AI配置
  ai:
    dashscope:
      api-key: ${SPRING_AI_DASHSCOPE_API_KEY:}
      chat:
        model: qwen3.5-plus
        options:
          temperature: 0.7
          max-tokens: 2000
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1024

logging:
  level:
    com.travel.ai: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%X{requestId}] --- [%15.15t] %-40.40logger{39} : %m%n"

# Actuator：仅暴露 health / info，其余端点默认不对外
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # 匿名仅见 {"status":"UP"}；已认证用户可看各组件（db、redis 等）
      show-details: when_authorized
      show-components: when_authorized
      # 开启 health 子路径探活（/actuator/health/liveness 和 /actuator/health/readiness）
      probes:
        enabled: true
  # Kubernetes 风格探活（可选，负载均衡/编排常用）
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
weather:
  api-key: ${WEATHER_API_KEY:}
  # 兼容：HTTP 超时优先见 app.agent.tool-timeout；未迁移时仍读此毫秒值（见 WeatherTool）
  timeout-ms: 3000

app:
  memory:
    long-term:
      # 默认关闭：开启后才会从库加载画像，并在 inject-into-prompt=true 时注入主线 WRITE 前 prompt
      enabled: false
      inject-into-prompt: true
      skip-usernames:
        - eval-gateway
        - anonymous
    profile:
      max-slots: 10
      max-value-chars: 512
      max-inject-chars: 1200
    auto-extract:
      # 为 true 时才允许 LLM 抽取（手动 POST /travel/profile/extract-suggestion 与 after-chat 钩子）
      enabled: false
      # SSE 整轮正常结束后异步抽取（仍受 enabled 约束）
      after-chat: false
      # true：仅写 Redis 待确认，须 POST /travel/profile/confirm-extraction；false：after-chat 下直接 upsert 画像（慎用）
      require-confirm: true
      pending-ttl: 1h
      llm-timeout-seconds: 12
  conversation:
    # true：仅允许已通过 POST /travel/conversations 登记到当前用户的 conversationId 访问 GET /travel/chat/{id}（生产推荐）
    require-registration: false
    # 聊天 query 最大字符数（GET 查询参数与 POST JSON body 共用上限）
    max-query-chars: 8192
  # P1-3：POST /travel/feedback 长评截断与列表分页上限
  feedback:
    max-comment-chars: 2000
    max-page-size: 100
  sse:
    # SSE 空闲心跳间隔（秒），发送标准 comment 行，避免网关/代理因长时间无字节而断开
    heartbeat-seconds: 15
  knowledge:
    init:
      enabled: false
  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-me-in-local}
      expire-seconds: 3600
  # Bucket4j 限流：次数与文档、README 保持一致；可按环境覆盖
  rate-limit:
    chat:
      # 每个登录用户（或匿名时的 IP）每分钟允许发起的「聊天 SSE」请求次数
      requests-per-minute: 5
    login:
      # 每个 IP 每分钟允许的登录 POST 次数，防止撞库/暴力尝试（与聊天限流分开计数）
      requests-per-minute: 20
  rag:
    rewrite:
      # QueryRewriter 单行最大长度，防止异常输出撑爆 embedding 请求
      max-line-length: 256
    # 向量检索零命中时主线行为（对齐 travel-ai-upgrade P0 默认）：clarify=不调 LLM 编造行程，仅返回澄清话术
    empty-hits-behavior: clarify
  eval:
    # 评测 HTTP 网关密钥：请求头 X-Eval-Gateway-Key 须与本值一致（与 X-Eval-Token 分离；后者仍用于 membership HMAC）
    gateway-key: ${APP_EVAL_GATEWAY_KEY:}
    # 评测 TOOL stub 等待上限（毫秒）；timeout 场景下与 app.agent.tool-timeout 取 min 后作为 Future.get 上限（见 EvalToolStageRunner）
    tool-timeout-ms: 100
    # 仅测试用：评测 stub 主路径入口 sleep（毫秒）；生产必须为 0（默认）。见 EvalChatControllerTotalTimeoutTest
    stub-work-sleep-ms: 0
    # 是否在 eval 响应 meta 中写入 recovery_action（及场景下的 self_check）；false 便于与旧 harness 严格 JSON 对照
    reflection-meta-enabled: true
    # llm_mode=real 时是否要求 eval_tags 命中前缀后才触发 usage 探针（默认 true，避免跑批全量计费）
    llm-real-require-tag-match: true
    # 与上一项联用：任一 eval_tag 以列表中任一前缀开头则允许探针；省略时默认仅 cost/
    # llm-real-required-tag-prefixes:
    #   - cost/
    # 是否在 meta 中额外写入 config_snapshot 对象（与 config_snapshot_hash 同源白名单；默认 false）
    config-snapshot-meta-enabled: false
    # 是否在带 conversation_id 的评测请求结束时 UPSERT eval_conversation_checkpoint（默认 true；失败只打日志）
    checkpoint-persistence-enabled: true
  agent:
    plan-stage:
      # 主线 PLAN 是否调用 LLM 产出 JSON（集成测试默认关，见 application-test.yml）
      enabled: ${APP_AGENT_PLAN_STAGE_ENABLED:true}
    # 单轮 SSE 总墙钟上限（从客户端订阅建立后起算，含引用首包、正文流、心跳直至结束）
    total-timeout: 120s
    # 固定流水线阶段数上限（当前实现为 PLAN+RETRIEVE+TOOL+GUARD+WRITE 共 5 步；配置须 ≥5 否则拒绝该轮）
    max-steps: 8
    # 工具 HTTP 超时（天气 OkHttp）；优先于 weather.timeout-ms
    tool-timeout: 3s
    # WRITE 阶段 ChatClient 流式超时（应小于 total-timeout）
    llm-stream-timeout: 20s