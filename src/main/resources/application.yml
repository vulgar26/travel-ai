  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/ragent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Redis配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  # Spring AI配置
  ai:
    dashscope:
      api-key: sk-b794530a9b23492591c64eccabc7f891
      chat:
        model: qwen3.5-plus
        options:
          temperature: 0.7
          max-tokens: 2000
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1024

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.travel.ai.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.travel.ai: debug

weather:
  api-key: 4c387d077c804a5382c4166cd2980d83