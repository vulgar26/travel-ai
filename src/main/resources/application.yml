server:
  port: 8081

spring:
  application:
    name: travel-ai-planner

#  # 数据库配置
#  datasource:
#    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://127.0.0.1:3306/travel_ai?useSSL=false&serverTimezone=Asia/Shanghai
#    username: root
#    password: ${DB_PASSWORD}

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/ragent
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    # 已有库 public 里已有表/扩展，但从未跑过 Flyway（无 flyway_schema_history）时，需先 baseline 再迁移
    baseline-on-migrate: true
    # 设为 0：基线后仍会执行 V1（V1 内为 IF NOT EXISTS，可安全重跑）；默认 1 会导致 V1 被当作已处于基线而跳过
    baseline-version: 0

  # Redis配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  # Spring AI配置
  ai:
    dashscope:
      api-key: ${SPRING_AI_DASHSCOPE_API_KEY:}
      chat:
        model: qwen3.5-plus
        options:
          temperature: 0.7
          max-tokens: 2000
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1024

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.travel.ai.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.travel.ai: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%X{requestId}] --- [%15.15t] %-40.40logger{39} : %m%n"

# Actuator：仅暴露 health / info，其余端点默认不对外
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # 匿名仅见 {"status":"UP"}；已认证用户可看各组件（db、redis 等）
      show-details: when_authorized
      show-components: when_authorized
      # 开启 health 子路径探活（/actuator/health/liveness 和 /actuator/health/readiness）
      probes:
        enabled: true
  # Kubernetes 风格探活（可选，负载均衡/编排常用）
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
weather:
  api-key: ${WEATHER_API_KEY:}
  # 天气接口调用超时时间（毫秒），默认 3000ms；目前未配置 api-url 时仍使用本地模拟数据
  timeout-ms: 3000

app:
  sse:
    # SSE 空闲心跳间隔（秒），发送标准 comment 行，避免网关/代理因长时间无字节而断开
    heartbeat-seconds: 15
  knowledge:
    init:
      enabled: false
  security:
    jwt:
      secret: ${APP_JWT_SECRET:change-me-in-local}
      expire-seconds: 3600