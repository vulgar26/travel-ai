# 集成测试（Testcontainers）：密钥占位即可，不向公网发起真实 LLM 调用
spring:
  ai:
    dashscope:
      api-key: sk-test-placeholder-not-used-in-these-tests

app:
  security:
    jwt:
      secret: test-jwt-secret-must-be-at-least-32-chars-long
  eval:
    gateway-key: it-eval-gateway-key
  agent:
    plan-stage:
      enabled: false
    total-timeout: 300s
    max-steps: 8
    tool-timeout: 15s
    llm-stream-timeout: 60s
  # 集成测试可能多次调登录/业务接口，放宽限流避免 CI 偶发 429
  rate-limit:
    chat:
      requests-per-minute: 1000
    login:
      requests-per-minute: 1000

weather:
  api-key: test-weather-key

logging:
  level:
    root: warn
    com.travel.ai: info
